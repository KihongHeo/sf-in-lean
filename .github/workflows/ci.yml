# Continuous integration for Software Foundations in Lean.
#
# WHAT THIS DOES
#   On every pull request, and on every push to `main`, it builds the book.
#   If anything fails to compile the check turns red; with branch protection
#   enabled (see README.md) a red check blocks merging, so `main` always builds.
#
# RUN THE SAME CHECK LOCALLY
#   lake build        # build the book
#
# MAINTAINING THIS FILE
#   It is deliberately tiny. To add a check, add another step below.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Get the source code.
      - uses: actions/checkout@v4

      # Install the Lean toolchain pinned in `lean-toolchain` (with build
      # caching) and run `lake build`, which builds the book.
      - uses: leanprover/lean-action@v1
